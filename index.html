<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Library - 沉浸阅读</title>
    
    <script src="https://unpkg.com/pinyin-pro"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --paper-bg: #fffcf0;
            --text-main: #2d3436;
            --accent: #3b82f6;
            --pinyin-color: #f59e0b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background-color: #e2e8f0;
            font-family: 'Nunito', 'Microsoft YaHei', sans-serif;
            color: var(--text-main);
            display: flex; justify-content: center; min-height: 100vh;
        }

        .phone-container {
            width: 100%; max-width: 800px;
            background: var(--paper-bg);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }

        /* 界面切换控制 */
        .view { display: none; padding: 30px; animation: fadeIn 0.4s ease-out; }
        .view.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 封面样式大改版 --- */
        #view-cover { align-items: center; text-align: center; padding-top: 8vh; }
        .book-title { font-family: 'ZCOOL XiaoWei', serif; font-size: 52px; color: #0f172a; margin-bottom: 15px; line-height: 1.2; }
        .book-desc { font-size: 20px; color: #475569; margin-bottom: 40px; max-width: 90%; font-weight: 700; line-height: 1.5; }
        
        .char-section-title { font-weight: 900; color: #94a3b8; margin-bottom: 20px; font-size: 16px; letter-spacing: 4px; text-transform: uppercase; }
        .char-grid { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 500px; margin-bottom: 50px; }
        .char-card { 
            background: white; padding: 20px 25px; border-radius: 20px; border: 3px solid #e2e8f0;
            text-align: left; box-shadow: 0 8px 15px rgba(0,0,0,0.03); display: flex; flex-direction: column;
        }
        .char-name { font-weight: 900; font-size: 22px; color: var(--accent); margin-bottom: 8px; border-bottom: 2px dashed #e2e8f0; padding-bottom: 8px; }
        .char-intro { font-size: 18px; color: #334155; line-height: 1.6; font-weight: 700; }

        /* --- 目录样式 --- */
        .toc-list { display: flex; flex-direction: column; gap: 15px; }
        .toc-item { 
            background: white; padding: 22px; border-radius: 20px; border: 3px solid #e2e8f0;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            font-weight: 900; font-size: 18px; color: #1e293b; transition: 0.2s; box-shadow: 0 4px 0 #cbd5e1;
        }
        .toc-item:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; background: #eff6ff; border-color: #3b82f6; color: #1d4ed8; }

        /* --- 阅读页排版（出版级中文排版） --- */
        .reader-header { 
            position: sticky; top: 0; background: rgba(255,252,240,0.95); 
            padding: 15px 0; border-bottom: 2px solid #e2e8f0; backdrop-filter: blur(5px);
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .btn-back { border: none; background: none; font-size: 18px; font-weight: 900; color: var(--accent); cursor: pointer; }
        .chapter-title-display { font-weight: 900; font-size: 20px; color: #0f172a; }

        #story-content { 
            margin-top: 20px; 
            padding-bottom: 120px;
        }

        /* 💡 完美的中文段落格式 */
        #story-content p {
            font-size: 22px; 
            line-height: 2.2; /* 给拼音留足高度 */
            color: #1e293b;
            font-weight: 700;
            text-align: justify;
            text-indent: 2em; /* 首行缩进两个中文字符 */
            margin-bottom: 1.2em; /* 段落之间的间距 */
            letter-spacing: 1px; /* 舒适的字间距 */
        }

        /* 💡 拼音核心 CSS */
        ruby { 
            cursor: pointer; 
            ruby-align: center;
        }
        rt { 
            opacity: 0; 
            font-size: 0.6em; 
            color: var(--pinyin-color); 
            font-family: 'Comic Sans MS', sans-serif; 
            font-weight: 900;
            transition: opacity 0.2s ease-in-out;
            user-select: none;
        }
        ruby.show-py rt { opacity: 1; }

        /* 重点生词样式 */
        b { 
            color: #e11d48; 
            border-bottom: 3px dashed #fecaca; 
            padding-bottom: 2px;
        }

        /* 底部导航 */
        .nav-footer {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 800px; background: white;
            padding: 20px 30px; display: flex; gap: 20px; border-top: 3px solid #e2e8f0;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.05);
        }
        .btn-footer { flex: 1; padding: 15px; border-radius: 20px; border: none; font-weight: 900; cursor: pointer; font-size: 18px; box-shadow: 0 5px 0 rgba(0,0,0,0.1); transition: 0.15s;}
        .btn-footer:active { transform: translateY(5px); box-shadow: 0 0 0 transparent; }
        .btn-prev { background: #f1f5f9; color: #64748b; border: 3px solid #e2e8f0; box-shadow: 0 5px 0 #cbd5e1; }
        .btn-next { background: var(--accent); color: white; box-shadow: 0 5px 0 #2563eb; }
        .btn-footer:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--paper-bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div style="font-size: 50px; margin-bottom: 20px; animation: float 2s infinite alternate;">📖</div>
        <div style="font-weight: 900; color: #3b82f6; font-size: 20px;">正在从云端图书馆取书...</div>
    </div>

    <div class="phone-container">
        
        <div id="view-cover" class="view">
            <div id="cover-pic" style="font-size: 80px; margin-bottom: 20px;">📘</div>
            <h1 class="book-title" id="display-title">载入中...</h1>
            <p class="book-desc" id="display-desc"></p>
            
            <div class="char-section-title">✨ 主要人物 ✨</div>
            <div class="char-grid" id="display-chars"></div>
            
            <button class="btn-footer btn-next" onclick="switchView('view-toc')" style="max-width: 250px; flex: none; width: 100%;">开始阅读</button>
        </div>

        <div id="view-toc" class="view">
            <div style="display: flex; align-items: center; margin-bottom: 30px;">
                <button class="btn-back" onclick="switchView('view-cover')">← 返回封面</button>
                <h2 style="margin: 0 auto; font-weight: 900; font-size: 24px; padding-right: 80px;">📚 目录</h2>
            </div>
            <div class="toc-list" id="display-toc"></div>
        </div>

        <div id="view-reading" class="view">
            <header class="reader-header">
                <button class="btn-back" onclick="switchView('view-toc')">⬅ 目录</button>
                <span class="chapter-title-display" id="chapter-name-ui">章节内容</span>
                <div style="width: 60px;"></div>
            </header>
            
            <div id="story-content"></div>

            <footer class="nav-footer">
                <button class="btn-footer btn-prev" id="btn-prev-chap" onclick="moveChapter(-1)">上一章</button>
                <button class="btn-footer btn-next" id="btn-next-chap" onclick="moveChapter(1)">下一章</button>
            </footer>
        </div>

    </div>

<script>
    // 你的数据源链接
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-jsRDCZ56umRMvsaZiXPJbGYAxWEzq3kQ7Fv4JjPg3f1zhAU8uDL_HE6ZCFDOnTfJ7n81Ei0VLIWe/pub?gid=0&single=true&output=csv";
    
    let bookData = { meta: {}, characters: [], chapters: [] };
    let currentChapterIdx = 0;

    // 1. 初始化并拉取数据 (已修复 URL 参数拼接问题)
    async function loadBook() {
        Papa.parse(CSV_URL + "&t=" + Date.now(), {
            download: true,
            header: true,
            complete: function(results) {
                if (results.data && results.data.length > 0) {
                    parseData(results.data);
                    renderBookInfo();
                    document.getElementById('loading-overlay').style.display = 'none';
                    switchView('view-cover');
                } else {
                    document.getElementById('loading-overlay').innerHTML = "<div style='color:#ef4444; font-weight:900;'>⚠️ 表格没数据，请检查链接！</div>";
                }
            },
            error: function() {
                document.getElementById('loading-overlay').innerHTML = "<div style='color:#ef4444; font-weight:900;'>⚠️ 网络错误或链接失效！</div>";
            }
        });
    }

    // 2. 解析 CSV 数据结构
    function parseData(rows) {
        rows.forEach(row => {
            const type = (row.Type || "").toUpperCase();
            if (type === 'META') {
                bookData.meta[row.Title] = row.Content;
            } else if (type === 'CHAR') {
                bookData.characters.push({ name: row.Title, intro: row.Content });
            } else if (type === 'CHAPTER') {
                bookData.chapters.push({ title: row.Title, content: row.Content });
            }
        });
    }

    // 3. 渲染封面和目录
    function renderBookInfo() {
        document.getElementById('display-title').innerText = bookData.meta['Title'] || "我的故事书";
        document.getElementById('display-desc').innerText = bookData.meta['Description'] || "";
        document.getElementById('cover-pic').innerText = bookData.meta['Picture'] || "📘";

        const charContainer = document.getElementById('display-chars');
        if (bookData.characters.length === 0) {
            document.querySelector('.char-section-title').style.display = 'none';
        } else {
            charContainer.innerHTML = bookData.characters.map(c => `
                <div class="char-card">
                    <div class="char-name">${c.name}</div>
                    <div class="char-intro">${c.intro}</div>
                </div>
            `).join('');
        }

        const tocContainer = document.getElementById('display-toc');
        tocContainer.innerHTML = bookData.chapters.map((ch, index) => `
            <div class="toc-item" onclick="openChapter(${index})">
                <span>${ch.title}</span>
                <span style="color:#94a3b8; font-size:14px;">▶</span>
            </div>
        `).join('');
    }

    // 4. 视图切换
    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        window.scrollTo(0, 0);
    }

    // 💡 5. 核心逻辑：处理换行符并生成完美段落
    function formatStoryContent(rawText) {
        // 使用正则同时匹配：真实的换行符(\n)、回车符(\r)、以及打出来的字符串"\n"
        let textBlocks = rawText.split(/\\n|\r?\n/);
        let finalHtml = "";
        
        textBlocks.forEach(block => {
            let cleanBlock = block.trim();
            // 只要这段不是空的，就把它包成一个 <p> 段落
            if (cleanBlock.length > 0) {
                // 调用拼音库给这一段加上注音标签
                let pinyinHtml = pinyinPro.html(cleanBlock);
                finalHtml += `<p>${pinyinHtml}</p>`;
            }
        });
        
        return finalHtml;
    }

    // 6. 打开章节
    function openChapter(index) {
        currentChapterIdx = index;
        const chapter = bookData.chapters[index];
        document.getElementById('chapter-name-ui').innerText = chapter.title;
        
        // 调用我们刚刚写的神仙格式化函数
        const formattedHtml = formatStoryContent(chapter.content);
        document.getElementById('story-content').innerHTML = formattedHtml;
        
        // 绑定点击事件：点击 ruby 标签显示/隐藏拼音
        document.querySelectorAll('ruby').forEach(el => {
            el.onclick = function() {
                this.classList.toggle('show-py');
            };
        });

        // 更新底部导航按钮状态
        document.getElementById('btn-prev-chap').disabled = (index === 0);
        document.getElementById('btn-next-chap').disabled = (index === bookData.chapters.length - 1);

        switchView('view-reading');
    }

    function moveChapter(step) {
        let newIdx = currentChapterIdx + step;
        if (newIdx >= 0 && newIdx < bookData.chapters.length) {
            openChapter(newIdx);
        }
    }

    window.onload = loadBook;
</script>

</body>
</html>
