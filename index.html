<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Library - 沉浸阅读</title>
    
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro/dist/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --paper-bg: #fffcf0;
            --text-main: #2d3436;
            --accent: #3b82f6;
            --pinyin-color: #f59e0b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background-color: #e2e8f0;
            font-family: 'Nunito', 'Microsoft YaHei', sans-serif;
            color: var(--text-main);
            display: flex; justify-content: center; min-height: 100vh;
        }

        .phone-container {
            width: 100%; max-width: 800px;
            background: var(--paper-bg);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }

        .view { display: none; padding: 30px; animation: fadeIn 0.4s ease-out; }
        .view.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 书架 */
        #view-bookshelf { align-items: center; padding-top: 8vh; background: #f8fafc; }
        .shelf-title-ui { font-weight: 900; color: #0f172a; font-size: 32px; margin-bottom: 40px; }
        .book-spine { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; }
        .spine-img { width: 160px; height: 220px; object-fit: cover; border-radius: 8px 15px 15px 8px; border: 2px solid white; box-shadow: -5px 15px 25px rgba(0,0,0,0.15); margin-bottom: 15px; }

        /* 扉页 */
        #view-cover { align-items: center; text-align: center; padding-top: 6vh; }
        .book-title { font-family: 'ZCOOL XiaoWei', serif; font-size: 42px; color: #0f172a; margin: 0 0 15px 0; }
        
        /* 🌟 目录页：两列紧凑模式优化 */
        #display-toc {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 强制两列并排 */
            gap: 12px;
            padding: 10px 0;
        }
        .toc-item { 
            background: white; 
            padding: 12px 10px; /* 缩小内边距 */
            border-radius: 12px; 
            border: 2px solid #e2e8f0; 
            cursor: pointer; 
            font-weight: 900; 
            font-size: 15px; /* 稍微缩小字体 */
            transition: 0.2s; 
            box-shadow: 0 3px 0 #cbd5e1; 
            text-align: center; 
            color: #1e293b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* 文字过长显示省略号，保持整齐 */
        }
        .toc-item:active { transform: translateY(3px); box-shadow: 0 0 0 transparent; background: #eff6ff; }

        /* 阅读页 */
        .reader-header { position: sticky; top: 0; background: rgba(255,252,240,0.96); padding: 15px 20px; border-bottom: 2px solid #e2e8f0; backdrop-filter: blur(8px); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .chapter-img-inline { width: 100%; height: auto; display: block; border-radius: 15px; margin: 10px 0 25px 0; box-shadow: 0 8px 25px rgba(0,0,0,0.08); border: 4px solid white; background-color: #f1f5f9; }
        #story-content p { font-size: 22px; line-height: 2.2; color: #1e293b; font-weight: 700; margin-bottom: 1.2em; text-indent: 2em; letter-spacing: 0.5px; text-align: justify; }

        .hz { cursor: pointer; border-radius: 4px; }
        #pinyin-floating-window { position: fixed; top: 20px; right: 20px; background: rgba(255, 255, 255, 0.98); border: 4px solid var(--accent); border-radius: 20px; padding: 10px 25px; font-size: 38px; font-family: 'Comic Sans MS', sans-serif; font-weight: 900; color: #f59e0b; box-shadow: 0 10px 30px rgba(0,0,0,0.15); opacity: 0; z-index: 9999; pointer-events: none; }

        .nav-footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 800px; background: white; padding: 15px 25px; display: flex; gap: 15px; border-top: 2px solid #e2e8f0; box-shadow: 0 -10px 20px rgba(0,0,0,0.03); }
        .btn-footer { flex: 1; padding: 16px; border-radius: 18px; border: none; font-weight: 900; cursor: pointer; font-size: 18px; box-shadow: 0 5px 0 rgba(0,0,0,0.1); }
        .btn-footer:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-prev { background: #f1f5f9; color: #64748b; border: 3px solid #e2e8f0; box-shadow: 0 5px 0 #cbd5e1; }
        .btn-next { background: var(--accent); color: white; box-shadow: 0 5px 0 #2563eb; }
    </style>
</head>
<body>

    <div id="pinyin-floating-window">py</div>

    <div id="loading-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--paper-bg); z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <div style="font-size: 50px; animation: float 2s infinite alternate;">📖</div>
        <div id="loading-text" style="font-weight:900; color:#3b82f6; margin-top:20px; font-size: 20px;">正在连接云端图书馆...</div>
    </div>

    <div class="phone-container">
        <div id="view-bookshelf" class="view">
            <div class="shelf-title-ui">📚 我的书架</div>
            <div class="book-spine" onclick="switchView('view-cover')">
                <img id="shelf-cover-img" src="" class="spine-img" onerror="this.src=''">
                <div class="spine-title" id="shelf-title">载入中...</div>
            </div>
        </div>

        <div id="view-cover" class="view">
            <h1 class="book-title" id="display-title">载入中...</h1>
            <p class="book-desc" id="display-desc"></p>
            <div class="char-grid" id="display-chars"></div>
            <button class="btn-footer btn-next" onclick="switchView('view-toc')" style="max-width:250px; margin-bottom:50px;">翻开目录</button>
            <button class="btn-footer btn-prev" onclick="switchView('view-bookshelf')" style="max-width:250px; margin-bottom:50px; border:none; background:none; box-shadow:none; color:#94a3b8;">返回书架</button>
        </div>

        <div id="view-toc" class="view">
            <header style="display:flex; align-items:center; margin-bottom:20px;">
                <button onclick="switchView('view-cover')" style="border:none; background:none; font-weight:900; color:var(--accent); font-size:16px; cursor:pointer;">← 扉页</button>
                <h2 style="margin:0 auto; padding-right:50px; font-weight:900;">目录</h2>
            </header>
            <div id="display-toc"></div>
        </div>

        <div id="view-reading" class="view">
            <header class="reader-header">
                <button onclick="switchView('view-toc')" class="btn-footer" style="flex:none; width:80px; padding:8px; font-size:13px; background:#f1f5f9; border: 2px solid #e2e8f0; box-shadow:0 3px 0 #cbd5e1;">⬅ 目录</button>
                <span id="chapter-name-ui" style="font-weight:900; font-size: 17px;">章节</span>
                <div style="width:80px;"></div>
            </header>
            <div style="margin-top:20px;">
                <div id="story-content"></div>
            </div>
            <footer class="nav-footer">
                <button class="btn-footer btn-prev" id="btn-prev-chap" onclick="moveChapter(-1)">上一章</button>
                <button class="btn-footer btn-next" id="btn-next-chap" onclick="moveChapter(1)">下一章</button>
            </footer>
        </div>
    </div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-jsRDCZ56umRMvsaZiXPJbGYAxWEzq3kQ7Fv4JjPg3f1zhAU8uDL_HE6ZCFDOnTfJ7n81Ei0VLIWe/pub?gid=0&single=true&output=csv";
    let bookData = { meta: {}, characters: [], chapters: [] };
    let currentChapterIdx = 0;

    async function loadBook() {
        try {
            const res = await fetch(CSV_URL + "&v=" + Date.now());
            const csvText = await res.text();
            Papa.parse(csvText, {
                header: true,
                transformHeader: h => h.replace(/^\uFEFF/, '').trim(),
                complete: function(results) {
                    parseData(results.data);
                    renderBookInfo();
                    document.getElementById('loading-overlay').style.display = 'none';
                    switchView('view-bookshelf'); 
                }
            });
        } catch (e) { document.getElementById('loading-text').innerText = "加载失败，请检查网络。"; }
    }

    function parseData(rows) {
        rows.forEach(row => {
            const type = (row.Type || row.TYPE || "").toUpperCase();
            if (type === 'META') bookData.meta[row.Title] = row.Content;
            else if (type === 'CHAR') bookData.characters.push({ name: row.Title, intro: row.Content });
            else if (type === 'CHAPTER') bookData.chapters.push({ title: row.Title, content: row.Content, media: row.Media });
        });
    }

    function renderBookInfo() {
        const bTitle = bookData.meta['Title'] || "我的书";
        const bPic = bookData.meta['Picture'] || "b1";
        document.getElementById('shelf-title').innerText = bTitle;
        document.getElementById('shelf-cover-img').src = `./${bPic}.png`;
        document.getElementById('display-title').innerText = bTitle;
        document.getElementById('display-desc').innerText = bookData.meta['Description'] || "";

        document.getElementById('display-chars').innerHTML = bookData.characters.map(c => `
            <div class="char-card">
                <div class="char-info">
                    <div class="char-name">${c.name}</div>
                    <div class="char-intro">${c.intro}</div>
                </div>
            </div>`).join('');

        document.getElementById('display-toc').innerHTML = bookData.chapters.map((ch, i) => `
            <div class="toc-item" onclick="openChapter(${i})">${ch.title}</div>`).join('');
    }

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        window.scrollTo(0, 0);
    }

    // 🌟 修复版排版引擎：完美处理 视频、Media插画、以及自动命名的Png图
    function formatStoryContent(rawText, chapterIndex, mediaUrl) {
        let textBlocks = rawText.split(/\\n|\r?\n/);
        let paragraphs = [];
        let hasManualImg = false; 
        
        // 1. 智能判定媒体代码
        let mediaHtml = "";
        if (mediaUrl && mediaUrl.trim() !== "") {
            // A. 如果 Media 列有东西，就用那一列
            const url = mediaUrl.trim();
            if (url.match(/\.(mp4|webm|mov)$/i) || url.includes("video")) {
                mediaHtml = `<video src="${url}" autoplay loop muted playsinline class="chapter-img-inline" style="cursor:pointer;" onclick="if(this.paused){this.play(); this.muted=false;}else{this.pause();}"></video>`;
            } else {
                mediaHtml = `<img src="${url}" class="chapter-img-inline" onerror="this.style.display='none'">`;
            }
        } else {
            // B. 如果 Media 列是空的，回退到自动寻找Png插图的老规则
            const baseName = bookData.meta['Picture'] || "b1";
            const fallbackImg = `./${baseName}c${chapterIndex + 1}.png`;
            mediaHtml = `<img src="${fallbackImg}" class="chapter-img-inline" onerror="this.style.display='none'">`;
        }

        // 2. 替换 [图] 占位符
        textBlocks.forEach(block => {
            let cleanBlock = block.trim();
            if (cleanBlock.length === 0) return;

            if (cleanBlock.includes('[图]') || cleanBlock.includes('【图】')) {
                hasManualImg = true;
                cleanBlock = cleanBlock.replace(/\[图\]|【图】/g, mediaHtml);
            }

            let tempDiv = document.createElement('div');
            tempDiv.innerHTML = cleanBlock;
            
            function processNode(node) {
                if (node.nodeType === 3) { 
                    let text = node.nodeValue;
                    let pyArray = pinyinPro.pinyin(text, { type: 'array' }); 
                    let newHtml = "";
                    for(let i=0; i<text.length; i++) {
                        let char = text[i];
                        if(/[\u4e00-\u9fa5]/.test(char)) {
                            newHtml += `<span class="hz" data-py="${pyArray[i]}">${char}</span>`;
                        } else { newHtml += char; }
                    }
                    let wrapper = document.createElement('span');
                    wrapper.innerHTML = newHtml;
                    while (wrapper.firstChild) { node.parentNode.insertBefore(wrapper.firstChild, node); }
                    node.parentNode.removeChild(node);
                } else if (node.nodeType === 1) { 
                    if (node.tagName === 'VIDEO' || node.tagName === 'IMG') return;
                    Array.from(node.childNodes).forEach(processNode);
                }
            }
            Array.from(tempDiv.childNodes).forEach(processNode);
            paragraphs.push(`<p>${tempDiv.innerHTML}</p>`);
        });

        let finalHtml = "";
        if (hasManualImg) {
            finalHtml = paragraphs.join('');
        } else {
            // 如果全文没敲 [图]，默认插在第二段前面（作为展示图）
            if (paragraphs.length > 1) {
                finalHtml = paragraphs[0] + mediaHtml + paragraphs.slice(1).join('');
            } else {
                finalHtml = mediaHtml + (paragraphs[0] || "");
            }
        }
        return finalHtml;
    }

    const pinyinWin = document.getElementById('pinyin-floating-window');
    function openChapter(index) {
        currentChapterIdx = index;
        const chapter = bookData.chapters[index];
        document.getElementById('chapter-name-ui').innerText = chapter.title;
        document.getElementById('story-content').innerHTML = formatStoryContent(chapter.content, index, chapter.media);
        
        document.querySelectorAll('.hz').forEach(el => {
            const show = (e) => {
                if(e && e.type === 'touchstart') e.preventDefault();
                pinyinWin.innerText = el.getAttribute('data-py');
                pinyinWin.style.opacity = '1';
                el.style.color = 'var(--accent)';
                el.style.background = '#e0f2fe';
            };
            const hide = () => {
                pinyinWin.style.opacity = '0';
                el.style.color = ''; el.style.background = '';
            };
            el.addEventListener('touchstart', show); el.addEventListener('touchend', hide);
            el.addEventListener('mousedown', show); el.addEventListener('mouseup', hide);
        });

        document.getElementById('btn-prev-chap').disabled = (index === 0);
        document.getElementById('btn-next-chap').disabled = (index === bookData.chapters.length - 1);
        switchView('view-reading');
    }

    function moveChapter(step) {
        let newIdx = currentChapterIdx + step;
        if (newIdx >= 0 && newIdx < bookData.chapters.length) openChapter(newIdx);
    }
    document.addEventListener('DOMContentLoaded', loadBook);
</script>
</body>
</html>
