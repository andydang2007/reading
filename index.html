<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Library - 沉浸阅读</title>
    
    <script src="https://unpkg.com/pinyin-pro"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --paper-bg: #fffcf0;
            --text-main: #2d3436;
            --accent: #3b82f6;
            --pinyin-color: #f59e0b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background-color: #e2e8f0;
            font-family: 'Nunito', 'Microsoft YaHei', sans-serif;
            color: var(--text-main);
            display: flex; justify-content: center; min-height: 100vh;
        }

        .phone-container {
            width: 100%; max-width: 800px;
            background: var(--paper-bg);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }

        /* 界面切换控制 */
        .view { display: none; padding: 30px; animation: fadeIn 0.4s ease-out; }
        .view.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 封面样式 --- */
        #view-cover { align-items: center; text-align: center; padding-top: 10vh; }
        .book-title { font-family: 'ZCOOL XiaoWei', serif; font-size: 52px; color: #0f172a; margin-bottom: 10px; }
        .book-desc { font-size: 18px; color: #64748b; margin-bottom: 40px; max-width: 80%; }
        
        .char-grid { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 50px; }
        .char-card { 
            background: white; padding: 15px; border-radius: 20px; border: 2px solid #e2e8f0;
            width: 160px; box-shadow: 0 10px 15px rgba(0,0,0,0.05);
        }
        .char-name { font-weight: 900; font-size: 20px; color: var(--accent); margin-bottom: 5px; }
        .char-intro { font-size: 13px; color: #64748b; line-height: 1.4; }

        /* --- 目录样式 --- */
        .toc-list { display: flex; flex-direction: column; gap: 12px; }
        .toc-item { 
            background: white; padding: 20px; border-radius: 15px; border: 2px solid #e2e8f0;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            font-weight: 800; transition: 0.2s;
        }
        .toc-item:active { transform: scale(0.98); background: #eff6ff; }

        /* --- 阅读页样式 --- */
        .reader-header { 
            position: sticky; top: 0; background: var(--paper-bg); 
            padding: 15px 0; border-bottom: 1px solid #e2e8f0;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .btn-back { border: none; background: none; font-size: 16px; font-weight: 900; color: var(--accent); cursor: pointer; }
        .chapter-title-display { font-weight: 900; font-size: 18px; }

        #story-content { 
            font-size: 24px; line-height: 2.8; /* 宽行距给拼音留位 */
            margin-top: 30px; font-weight: 700;
            padding-bottom: 100px;
        }

        /* 💡 拼音核心 CSS */
        ruby { cursor: pointer; display: inline-block; padding: 0 1px; transition: 0.1s; }
        ruby:active { transform: scale(1.2); color: var(--accent); }
        rt { 
            opacity: 0; font-size: 0.5em; color: var(--pinyin-color); 
            font-family: 'Comic Sans MS', sans-serif; font-weight: 900;
            transform: translateY(5px); transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
        }
        ruby.show-py rt { opacity: 1; transform: translateY(0); }

        b { color: #e11d48; border-bottom: 2px dashed #fecaca; }

        /* 底部导航 */
        .nav-footer {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 800px; background: white;
            padding: 15px 30px; display: flex; gap: 20px; border-top: 2px solid #e2e8f0;
        }
        .btn-footer { flex: 1; padding: 12px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; font-size: 16px; }
        .btn-prev { background: #f1f5f9; color: #64748b; }
        .btn-next { background: var(--accent); color: white; }
        .btn-footer:disabled { opacity: 0.3; cursor: not-allowed; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--paper-bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div style="font-size: 50px; margin-bottom: 20px; animation: float 2s infinite alternate;">📖</div>
        <div style="font-weight: 900; color: #3b82f6;">正在从云端图书馆取书...</div>
    </div>

    <div class="phone-container">
        
        <div id="view-cover" class="view">
            <div id="cover-pic" style="font-size: 80px; margin-bottom: 20px;">📘</div>
            <h1 class="book-title" id="display-title">载入中...</h1>
            <p class="book-desc" id="display-desc"></p>
            
            <div style="font-weight: 900; color: #94a3b8; margin-bottom: 15px; font-size: 14px; letter-spacing: 2px;">主角登场</div>
            <div class="char-grid" id="display-chars"></div>
            
            <button class="btn-footer btn-next" onclick="switchView('view-toc')" style="max-width: 250px; flex: none;">开始阅读</button>
        </div>

        <div id="view-toc" class="view">
            <div style="display: flex; align-items: center; margin-bottom: 30px;">
                <button class="btn-back" onclick="switchView('view-cover')">← 封面</button>
                <h2 style="margin: 0 auto; font-weight: 900;">目录</h2>
            </div>
            <div class="toc-list" id="display-toc"></div>
        </div>

        <div id="view-reading" class="view">
            <header class="reader-header">
                <button class="btn-back" onclick="switchView('view-toc')">⬅ 目录</button>
                <span class="chapter-title-display" id="chapter-name-ui">章节内容</span>
                <div style="width: 50px;"></div>
            </header>
            
            <div id="story-content"></div>

            <footer class="nav-footer">
                <button class="btn-footer btn-prev" id="btn-prev-chap" onclick="moveChapter(-1)">上一章</button>
                <button class="btn-footer btn-next" id="btn-next-chap" onclick="moveChapter(1)">下一章</button>
            </footer>
        </div>

    </div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-jsRDCZ56umRMvsaZiXPJbGYAxWEzq3kQ7Fv4JjPg3f1zhAU8uDL_HE6ZCFDOnTfJ7n81Ei0VLIWe/pub?gid=0&single=true&output=csv";
    
    let bookData = {
        meta: {},
        characters: [],
        chapters: []
    };
    let currentChapterIdx = 0;

    // 1. 初始化并拉取数据
    async function loadBook() {
        Papa.parse(CSV_URL + "?t=" + Date.now(), {
            download: true,
            header: true,
            complete: function(results) {
                parseData(results.data);
                renderBookInfo();
                document.getElementById('loading-overlay').style.display = 'none';
                switchView('view-cover');
            }
        });
    }

    // 2. 解析 CSV 数据结构
    function parseData(rows) {
        rows.forEach(row => {
            const type = (row.Type || "").toUpperCase();
            if (type === 'META') {
                bookData.meta[row.Title] = row.Content;
            } else if (type === 'CHAR') {
                bookData.characters.push({ name: row.Title, intro: row.Content });
            } else if (type === 'CHAPTER') {
                bookData.chapters.push({ title: row.Title, content: row.Content });
            }
        });
    }

    // 3. 渲染封面和目录
    function renderBookInfo() {
        document.getElementById('display-title').innerText = bookData.meta['Title'] || "我的故事书";
        document.getElementById('display-desc').innerText = bookData.meta['Description'] || "";
        document.getElementById('cover-pic').innerText = bookData.meta['Picture'] || "📘";

        // 渲染人物
        const charContainer = document.getElementById('display-chars');
        charContainer.innerHTML = bookData.characters.map(c => `
            <div class="char-card">
                <div class="char-name">${c.name}</div>
                <div class="char-intro">${c.intro}</div>
            </div>
        `).join('');

        // 渲染目录
        const tocContainer = document.getElementById('display-toc');
        tocContainer.innerHTML = bookData.chapters.map((ch, index) => `
            <div class="toc-item" onclick="openChapter(${index})">
                <span>${ch.title}</span>
                <span style="color:#94a3b8">▶</span>
            </div>
        `).join('');
    }

    // 4. 视图切换
    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        window.scrollTo(0, 0);
    }

    // 5. 打开章节
    function openChapter(index) {
        currentChapterIdx = index;
        const chapter = bookData.chapters[index];
        document.getElementById('chapter-name-ui').innerText = chapter.title;
        
        // 💡 注入拼音逻辑
        // pinyinPro.html 自动将汉字转为 <ruby> 结构
        const rawContent = chapter.content.replace(/<br\s*\/?>/gi, '\n'); 
        const htmlContent = pinyinPro.html(chapter.content);
        
        document.getElementById('story-content').innerHTML = htmlContent;
        
        // 绑定点击事件：点击 ruby 标签显示拼音
        document.querySelectorAll('ruby').forEach(el => {
            el.onclick = function() {
                this.classList.toggle('show-py');
            };
        });

        // 更新按钮状态
        document.getElementById('btn-prev-chap').disabled = (index === 0);
        document.getElementById('btn-next-chap').disabled = (index === bookData.chapters.length - 1);

        switchView('view-reading');
    }

    function moveChapter(step) {
        let newIdx = currentChapterIdx + step;
        if (newIdx >= 0 && newIdx < bookData.chapters.length) {
            openChapter(newIdx);
        }
    }

    window.onload = loadBook;
</script>

</body>
</html>
