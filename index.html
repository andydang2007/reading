<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Library - 沉浸阅读</title>
    
    <script src="https://unpkg.com/pinyin-pro"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --paper-bg: #fffcf0;
            --text-main: #2d3436;
            --accent: #3b82f6;
            --pinyin-color: #f59e0b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background-color: #e2e8f0;
            font-family: 'Nunito', 'Microsoft YaHei', sans-serif;
            color: var(--text-main);
            display: flex; justify-content: center; min-height: 100vh;
        }

        .phone-container {
            width: 100%; max-width: 800px;
            background: var(--paper-bg);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }

        /* 视图动画 */
        .view { display: none; padding: 30px; animation: fadeIn 0.4s ease-out; }
        .view.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 封面 --- */
        #view-cover { align-items: center; text-align: center; padding-top: 5vh; }
        .book-cover-img { 
            width: 220px; height: 300px; 
            object-fit: cover; border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            margin-bottom: 25px; border: 4px solid white;
        }
        .book-title { font-family: 'ZCOOL XiaoWei', serif; font-size: 48px; color: #0f172a; margin: 0 0 10px 0; line-height: 1.2; }
        .book-desc { font-size: 18px; color: #475569; margin-bottom: 30px; max-width: 90%; font-weight: 700; }
        
        .char-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 500px; margin-bottom: 40px; }
        .char-card { 
            background: white; padding: 18px 22px; border-radius: 18px; border: 2px solid #e2e8f0;
            text-align: left; display: flex; flex-direction: column;
        }
        .char-name { font-weight: 900; font-size: 20px; color: var(--accent); margin-bottom: 5px; }
        .char-intro { font-size: 16px; color: #475569; line-height: 1.5; font-weight: 700; }

        /* --- 目录 --- */
        .toc-item { 
            background: white; padding: 20px; border-radius: 18px; border: 2px solid #e2e8f0;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            font-weight: 900; font-size: 18px; margin-bottom: 12px; transition: 0.2s; box-shadow: 0 4px 0 #cbd5e1;
        }
        .toc-item:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; background: #eff6ff; }

        /* --- 阅读页 --- */
        .reader-header { 
            position: sticky; top: 0; background: rgba(255,252,240,0.96); 
            padding: 15px 20px; border-bottom: 2px solid #e2e8f0; backdrop-filter: blur(8px);
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .chapter-img { 
            width: 100%; max-height: 400px; object-fit: cover; 
            border-radius: 20px; margin-bottom: 25px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: none; 
        }

        #story-content p {
            font-size: 22px; line-height: 2.3; color: #1e293b; font-weight: 700;
            text-align: justify; text-indent: 2em; margin-bottom: 1.2em; letter-spacing: 2px;
        }

        /* 拼音悬浮 CSS */
        ruby { cursor: pointer; position: relative; display: inline-block; }
        rt { 
            opacity: 0; position: absolute; left: 50%; bottom: 85%; 
            transform: translateX(-50%); white-space: nowrap; 
            font-size: 0.55em; color: var(--pinyin-color); 
            font-family: 'Comic Sans MS', sans-serif; font-weight: 900;
            transition: 0.2s; pointer-events: none;
        }
        ruby.show-py rt { opacity: 1; transform: translateX(-50%) translateY(-2px); }
        b { color: #e11d48; border-bottom: 3px dashed #fecaca; }

        .nav-footer {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 800px; background: white;
            padding: 15px 25px; display: flex; gap: 15px; border-top: 2px solid #e2e8f0;
        }
        .btn-footer { flex: 1; padding: 14px; border-radius: 18px; border: none; font-weight: 900; cursor: pointer; font-size: 17px; }
        .btn-prev { background: #f1f5f9; color: #64748b; border: 2px solid #cbd5e1; }
        .btn-next { background: var(--accent); color: white; box-shadow: 0 4px 0 #2563eb; }
    </style>
</head>
<body>

    <div id="loading-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--paper-bg); z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <div style="font-size: 50px; animation: float 2s infinite alternate;">📖</div>
        <div style="font-weight:900; color:#3b82f6; margin-top:20px;">正在载入绘本馆...</div>
    </div>

    <div class="phone-container">
        <div id="view-cover" class="view">
            <img id="display-cover-img" src="" class="book-cover-img" onerror="this.style.display='none'">
            <h1 class="book-title" id="display-title">载入中...</h1>
            <p class="book-desc" id="display-desc"></p>
            <div class="char-grid" id="display-chars"></div>
            <button class="btn-footer btn-next" onclick="switchView('view-toc')" style="max-width:200px; margin-bottom:50px;">开始阅读</button>
        </div>

        <div id="view-toc" class="view">
            <header style="display:flex; align-items:center; margin-bottom:25px;">
                <button onclick="switchView('view-cover')" style="border:none; background:none; font-weight:900; color:var(--accent); font-size:18px;">← 封面</button>
                <h2 style="margin:0 auto; padding-right:50px;">目录</h2>
            </header>
            <div id="display-toc"></div>
        </div>

        <div id="view-reading" class="view">
            <header class="reader-header">
                <button onclick="switchView('view-toc')" class="btn-footer" style="flex:none; width:80px; padding:8px; font-size:14px; background:#f1f5f9;">⬅ 目录</button>
                <span id="chapter-name-ui" style="font-weight:900;">章节</span>
                <div style="width:80px;"></div>
            </header>
            
            <div style="margin-top:20px;">
                <img id="chapter-illustration" src="" class="chapter-img" onerror="this.style.display='none'" onload="this.style.display='block'">
                <div id="story-content"></div>
            </div>

            <footer class="nav-footer">
                <button class="btn-footer btn-prev" id="btn-prev-chap" onclick="moveChapter(-1)">前一章</button>
                <button class="btn-footer btn-next" id="btn-next-chap" onclick="moveChapter(1)">下一章</button>
            </footer>
        </div>
    </div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-jsRDCZ56umRMvsaZiXPJbGYAxWEzq3kQ7Fv4JjPg3f1zhAU8uDL_HE6ZCFDOnTfJ7n81Ei0VLIWe/pub?gid=0&single=true&output=csv";
    
    let bookData = { meta: {}, characters: [], chapters: [] };
    let currentChapterIdx = 0;

    async function loadBook() {
        Papa.parse(CSV_URL + "&t=" + Date.now(), {
            download: true,
            header: true,
            complete: function(results) {
                parseData(results.data);
                renderBookInfo();
                document.getElementById('loading-overlay').style.display = 'none';
                switchView('view-cover');
            }
        });
    }

    function parseData(rows) {
        rows.forEach(row => {
            const type = (row.Type || "").toUpperCase();
            if (type === 'META') bookData.meta[row.Title] = row.Content;
            else if (type === 'CHAR') bookData.characters.push({ name: row.Title, intro: row.Content });
            else if (type === 'CHAPTER') bookData.chapters.push({ title: row.Title, content: row.Content });
        });
    }

    function renderBookInfo() {
        document.getElementById('display-title').innerText = bookData.meta['Title'] || "载入中...";
        document.getElementById('display-desc').innerText = bookData.meta['Description'] || "";
        
        // 🌟 后缀改为 .png
        const coverImg = document.getElementById('display-cover-img');
        const picMeta = bookData.meta['Picture'] || "b1"; 
        coverImg.src = `./${picMeta}.png`; 

        document.getElementById('display-chars').innerHTML = bookData.characters.map(c => `
            <div class="char-card">
                <div class="char-name">${c.name}</div>
                <div class="char-intro">${c.intro}</div>
            </div>
        `).join('');

        document.getElementById('display-toc').innerHTML = bookData.chapters.map((ch, i) => `
            <div class="toc-item" onclick="openChapter(${i})">
                <span>${ch.title}</span><span style="color:#94a3b8">▶</span>
            </div>
        `).join('');
    }

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        window.scrollTo(0, 0);
    }

    function openChapter(index) {
        currentChapterIdx = index;
        const chapter = bookData.chapters[index];
        document.getElementById('chapter-name-ui').innerText = chapter.title;
        
        // 🌟 后缀改为 .png
        const chapImg = document.getElementById('chapter-illustration');
        const baseName = bookData.meta['Picture'] || "b1";
        chapImg.src = `./${baseName}c${index + 1}.png`;

        const textBlocks = chapter.content.split(/\\n|\r?\n/);
        let finalHtml = "";
        textBlocks.forEach(block => {
            if (block.trim().length > 0) {
                finalHtml += `<p>${pinyinPro.html(block)}</p>`;
            }
        });
        document.getElementById('story-content').innerHTML = finalHtml;
        
        document.querySelectorAll('ruby').forEach(el => {
            el.onclick = function() { this.classList.toggle('show-py'); };
        });

        document.getElementById('btn-prev-chap').disabled = (index === 0);
        document.getElementById('btn-next-chap').disabled = (index === bookData.chapters.length - 1);
        switchView('view-reading');
    }

    function moveChapter(step) {
        let newIdx = currentChapterIdx + step;
        if (newIdx >= 0 && newIdx < bookData.chapters.length) openChapter(newIdx);
    }

    window.onload = loadBook;
</script>
</body>
</html>
